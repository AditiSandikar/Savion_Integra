<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Savion Integra — Under Construction</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --cream:#F7F3EE;
    --navy:#2D3548;
    --navy-soft:#4B5468;
    --orange:#F47920;
    --orange-soft:#FBC79A;
    --line:#DDD5C9;
  }

  *{margin:0;padding:0;box-sizing:border-box;}

  html,body{
    height:100%;
    background:var(--cream);
    font-family:'Inter',sans-serif;
    color:var(--navy);
    overflow-x:hidden;
  }

  body{
    display:flex;
    align-items:center;
    justify-content:center;
    min-height:100vh;
    padding:32px 24px;
    position:relative;
  }

  /* faint background grid, like a blueprint / schematic */
  .grid-bg{
    position:fixed;
    inset:0;
    background-image:
      linear-gradient(var(--line) 1px, transparent 1px),
      linear-gradient(90deg, var(--line) 1px, transparent 1px);
    background-size:56px 56px;
    opacity:0.35;
    mask-image: radial-gradient(circle at 50% 40%, black 0%, transparent 75%);
    pointer-events:none;
  }

  .wrap{
    position:relative;
    width:100%;
    max-width:620px;
    text-align:center;
    z-index:1;
  }

  /* ---- actual brand logo image ---- */
  .logo-img{
    width:min(320px, 70vw);
    height:auto;
    margin:0 auto;
    display:block;
    opacity:0;
    animation:fadeUp 800ms ease forwards;
    animation-delay:.1s;
  }

  @keyframes fadeUp{ from{ opacity:0; transform:translateY(8px);} to{ opacity:1; transform:translateY(0);} }

  /* slow ambient pulse to signal "in progress" */
  .pulse-target{
    animation: fadeUp 800ms ease forwards, pulse 2.6s ease-in-out 1s infinite;
  }
  @keyframes pulse{
    0%,100%{ filter:drop-shadow(0 0 0 rgba(244,121,32,0)); }
    50%{ filter:drop-shadow(0 0 14px rgba(244,121,32,.35)); }
  }

  .rule{
    width:120px;
    height:1px;
    background:var(--line);
    margin:22px auto 16px;
    opacity:0;
    animation:fadeUp 600ms ease forwards;
    animation-delay:.9s;
  }

  .tagline{
    font-family:'Inter',sans-serif;
    font-weight:600;
    font-size:12.5px;
    letter-spacing:3px;
    text-transform:uppercase;
    color:var(--navy-soft);
    opacity:0;
    animation:fadeUp 600ms ease forwards;
    animation-delay:.9s;
  }
  .tagline .dot{ color:var(--orange); margin:0 8px; }

  .status{
    margin-top:44px;
    opacity:0;
    animation:fadeUp 700ms ease forwards;
    animation-delay:1.0s;
  }

  .status h1{
    font-family:'Poppins',sans-serif;
    font-weight:700;
    font-size:clamp(20px,3.6vw,26px);
    color:var(--navy);
    margin-bottom:10px;
  }

  .status p{
    font-size:15px;
    line-height:1.65;
    color:var(--navy-soft);
    max-width:460px;
    margin:0 auto;
  }

  /* progress bar built from little hex-node dashes, echoing the mark */
  .progress{
    display:flex;
    align-items:center;
    justify-content:center;
    gap:6px;
    margin-top:28px;
  }
  .progress .seg{
    width:34px;
    height:5px;
    border-radius:3px;
    background:var(--orange-soft);
    overflow:hidden;
    position:relative;
  }
  .progress .seg.done{ background:var(--orange); }
  .progress .seg.active{ background:var(--orange-soft); }
  .progress .seg.active::after{
    content:'';
    position:absolute;
    inset:0;
    background:var(--orange);
    transform:translateX(-100%);
    animation:fill 2.4s ease-in-out infinite;
  }
  @keyframes fill{
    0%{ transform:translateX(-100%);}
    50%{ transform:translateX(0);}
    100%{ transform:translateX(0);}
  }

  .notify{
    margin-top:36px;
    opacity:0;
    animation:fadeUp 700ms ease forwards;
    animation-delay:1.2s;
  }

  .notify form{
    display:flex;
    gap:8px;
    max-width:380px;
    margin:0 auto;
    flex-wrap:wrap;
    justify-content:center;
  }

  .notify input[type=email]{
    flex:1;
    min-width:200px;
    padding:12px 16px;
    border-radius:8px;
    border:1px solid var(--line);
    background:#fff;
    font-family:'Inter',sans-serif;
    font-size:14px;
    color:var(--navy);
    outline:none;
    transition:border-color .2s;
  }
  .notify input[type=email]:focus{
    border-color:var(--orange);
  }

  .notify button{
    padding:12px 22px;
    border-radius:8px;
    border:none;
    background:var(--navy);
    color:#fff;
    font-family:'Inter',sans-serif;
    font-weight:600;
    font-size:14px;
    cursor:pointer;
    transition:background .2s, transform .15s;
  }
  .notify button:hover{ background:var(--orange); }
  .notify button:active{ transform:scale(0.97); }

  .notify small{
    display:block;
    margin-top:10px;
    font-size:12px;
    color:var(--navy-soft);
    opacity:0.75;
  }

  .confirm{
    display:none;
    margin-top:14px;
    font-size:13.5px;
    font-weight:600;
    color:var(--orange);
  }

  footer{
    margin-top:52px;
    font-size:12px;
    color:var(--navy-soft);
    opacity:0;
    animation:fadeUp 700ms ease forwards;
    animation-delay:1.3s;
  }

  @media (prefers-reduced-motion: reduce){
    *{ animation-duration:0.01ms !important; animation-delay:0s !important; }
    .logo .edge, .logo .node, .logo .s-mark,
    .wordmark .savion, .wordmark .integra, .rule, .tagline,
    .status, .notify, footer{ opacity:1 !important; transform:none !important; }
  }
</style>
</head>
